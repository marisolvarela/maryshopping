apiVersion: apps/v1
kind: Deployment
metadata:
  name: maryshopping-frontend
  namespace: apps
  labels:
    app: maryshopping-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maryshopping-frontend
  template:
    metadata:
      labels:
        app: maryshopping-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: frontend
          image: ghcr.io/marisolvarela/maryshopping/maryshopping-frontend:20260406-77cae44
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: maryshopping-frontend-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false

---
apiVersion: v1
kind: Service
metadata:
  name: maryshopping-frontend
  namespace: apps
  labels:
    app: maryshopping-frontend
spec:
  selector:
    app: maryshopping-frontend
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
