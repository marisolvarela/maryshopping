apiVersion: apps/v1
kind: Deployment
metadata:
  name: maryshopping-postgres
  namespace: postgres
  labels:
    app: maryshopping-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maryshopping-postgres
  template:
    metadata:
      labels:
        app: maryshopping-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine3.22
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: maryshopping-postgres-config
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgresdb
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
      volumes:
        - name: postgresdb
          persistentVolumeClaim:
            claimName: maryshopping-postgres-pv-claim

---
apiVersion: v1
kind: Service
metadata:
  name: maryshopping-postgres
  namespace: postgres
  labels:
    app: maryshopping-postgres
spec:
  selector:
    app: maryshopping-postgres
  type: NodePort
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 31543
