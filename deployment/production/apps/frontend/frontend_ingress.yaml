apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: maryshopping-ingress
  namespace: apps
  labels:
    app: maryshopping
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: maryshopping.com
      http:
        paths:
          # Peticiones API → backend (mismo namespace)
          - path: /maryshopping
            pathType: Prefix
            backend:
              service:
                name: maryshopping-backend
                port:
                  number: 8089
          # Frontend → aplicación Nuxt
          - path: /
            pathType: Prefix
            backend:
              service:
                name: maryshopping-frontend
                port:
                  number: 3000
