apiVersion: v1
kind: ConfigMap
metadata:
  name: maryshopping-frontend-config
  namespace: apps
  labels:
    app: maryshopping-frontend
data:
  NODE_ENV: "production"
  NUXT_HOST: "0.0.0.0"
  NUXT_PORT: "3000"
  # URL relativa: el Ingress redirige /maryshopping al backend
  NUXT_PUBLIC_API_BASE: "/maryshopping"
